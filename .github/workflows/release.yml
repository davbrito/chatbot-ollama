name: Build and Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    env:
      ARCHIVE_NAME: chatbot-ollama-${{ github.ref_name }}.zip

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Verify build output
        run: |
          if [ ! -d dist ] || [ -z "$(ls -A dist)" ]; then
            echo "Build output directory 'dist/' is missing or empty." >&2
            exit 1
          fi

      - name: Create release archive
        run: zip -r "$ARCHIVE_NAME" dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ARCHIVE_NAME }}
          generate_release_notes: true
